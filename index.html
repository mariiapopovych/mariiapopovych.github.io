          -ms-transform-origin: top center;

    .flame {
      position: absolute;
      top: -40px; left: -18px;
      width: 40px; height: 60px;
      background: radial-gradient(circle at center, rgb(255,38,0) 0%, rgba(255,81,0,0.7) 40%, rgba(0,150,0,0) 80%);

              transform: scale(0.4) translateY(20px);
      pointer-events: none;

      z-index: 9999;
      -webkit-transition: opacity 0.3s ease;
              transition: opacity 0.3s ease;
    }

    /* ── ANIMATIONS ── */
    @-webkit-keyframes shimmer {

    @-webkit-keyframes burn {

      50%  { -webkit-transform: scale(1.1) translateY(-5px)  rotate(5deg);  transform: scale(1.1) translateY(-5px)  rotate(5deg);  opacity: 0.8; }

  <script>
    /* ── SMOOTH SCROLL POLYFILL for Safari < 15.4 & Firefox < 36 ── */
    (function () {
      if (!('scrollBehavior' in document.documentElement.style)) {
        document.querySelectorAll('a[href^="#"]').forEach(function (anchor) {
          anchor.addEventListener('click', function (e) {
            var target = document.getElementById(this.getAttribute('href').slice(1));
            if (!target) return;
            e.preventDefault();
            target.scrollIntoView({ behavior: 'smooth' });
          });
        });
      }
    })();

    /* ── LIGHTBOX ── */
    var galleryItems   = document.querySelectorAll('.gallery-item img');
    var lightbox       = document.getElementById('lightbox');
    var lightboxImg    = document.getElementById('lightbox-img');
    var lightboxCap    = document.getElementById('lightbox-caption');
    var lightboxClose  = document.getElementById('lightbox-close');

    function openLightbox(src, caption) {
      lightboxImg.src = src;
      lightboxCap.textContent = caption || 'Artwork detail';
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden'; /* prevent background scroll */
    }

    function closeLightbox() {
      lightbox.style.display = 'none';
      document.body.style.overflow = '';
    }

    galleryItems.forEach(function (img) {
      img.addEventListener('click', function () {
        openLightbox(img.src, img.alt);
      });
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxClose.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') closeLightbox();
    });
    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && lightbox.style.display === 'flex') closeLightbox();
    });

    /* ── VIDEO ── */
    var playIcon  = '<svg viewBox="0 0 24 24" fill="#fff" width="14" height="14" aria-hidden="true"><polygon points="5,3 19,12 5,21"/></svg>';
    var pauseIcon = '<svg viewBox="0 0 24 24" fill="#fff" width="14" height="14" aria-hidden="true"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>';

    function initVideoWrapper(wrapper) {
      var video = wrapper.querySelector('video');
      var btn   = wrapper.querySelector('.play-pause-btn');

      function togglePlay() {
        if (video.paused) {
          /* Pause all other videos first — avoids multiple concurrent playbacks */
          document.querySelectorAll('video').forEach(function (v) {
            if (v !== video && !v.paused) { v.pause(); }
          });
          var playPromise = video.play();
          /* Handle browsers that return a Promise from play() */
          if (playPromise !== undefined) {
            playPromise.then(function () {
              btn.innerHTML = pauseIcon;
              wrapper.classList.remove('paused');
            }).catch(function () {
              /* Autoplay blocked — leave paused state */
            });
          } else {
            btn.innerHTML = pauseIcon;
            wrapper.classList.remove('paused');
          }
        } else {
          video.pause();
          btn.innerHTML = playIcon;
          wrapper.classList.add('paused');
        }
      }

      btn.addEventListener('click', function (e) { e.stopPropagation(); togglePlay(); });
      video.addEventListener('click', togglePlay);
      video.addEventListener('ended', function () {
        btn.innerHTML = playIcon;
        wrapper.classList.add('paused');
      });
    }

    /* IntersectionObserver for lazy-loading videos */
    if ('IntersectionObserver' in window) {
      var videoObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          var wrapper = entry.target;
          var video   = wrapper.querySelector('video');
          var dataSrc = video.getAttribute('data-src');
          if (dataSrc && !video.getAttribute('src')) {
            video.src = dataSrc;
            video.load();
            wrapper.classList.remove('not-loaded');
            initVideoWrapper(wrapper);
          }
          videoObserver.unobserve(wrapper);
        });
      }, { rootMargin: '300px 0px' });

      document.querySelectorAll('.video-wrapper').forEach(function (w) {
        videoObserver.observe(w);
      });
    } else {
      /* Fallback: load all videos immediately for browsers without IntersectionObserver */
      document.querySelectorAll('.video-wrapper').forEach(function (wrapper) {
        var video   = wrapper.querySelector('video');
        var dataSrc = video.getAttribute('data-src');
        if (dataSrc) {
          video.src = dataSrc;
          video.load();
          wrapper.classList.remove('not-loaded');
          initVideoWrapper(wrapper);
        }
      });
    }

    /* ── MATCHBOX SCROLL ── */
    var match    = document.getElementById('match');
    var matchbox = document.getElementById('matchbox');
    var matchHeight = 80;

    function updateMatch() {
      var boxHeight        = matchbox.offsetHeight;
      var maxTop           = boxHeight - matchHeight;
      var scrollableHeight = document.body.scrollHeight - window.innerHeight;
      /* Avoid division by zero on very short pages */
      var scrollRatio      = scrollableHeight > 0
        ? Math.min(1, window.pageYOffset / scrollableHeight)
        : 0;

      match.style.top = (scrollRatio * maxTop) + 'px';

      if (scrollRatio >= 0.99) {
        match.classList.add('burning');
        document.body.classList.add('burning');
      } else {
        match.classList.remove('burning');
        document.body.classList.remove('burning');
      }
    }

    /* Use passive listener for better scroll performance on mobile */
    window.addEventListener('scroll', updateMatch, { passive: true });
    /* Trigger once on load in case page is pre-scrolled */
    updateMatch();
  </script>
</body>
</html>
