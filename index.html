<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mariia Popovych</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      font-family:"Bitcount Single", Arial, sans-serif;
      scroll-behavior: smooth;
      background: #ffffff;
      transition: background-color 0.6s ease;
    }

    body.burning {
      background: rgba(255, 255, 255, 0.8);
    }

    .navbar {
      position: sticky;
      top: 0;
      background: rgb(255, 255, 255);
      border: solid black 2px;
      backdrop-filter: blur(5px);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 10px 60px;
      z-index: 9;
    }

    .navbar img {
      height: 60px;
      width: auto;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }

    .navbar ul img {
      height: 40px;
      width: auto;
      cursor: pointer;
    }

    .scroll-frames {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .scroll-frames .bg-gif {
      width: 35%;
      max-height: 60vh;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      margin: auto;
      z-index: 0;
    }

    .contact-overlay {
      position: relative;
      z-index: 2;
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      color: #000;
      padding: 40px 20px;
      text-align: center;
      margin-top: 25px;
    }

    .contact-overlay img {
      height: 60px;
      margin-bottom: 20px;
    }

    .contact-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      font-size: 1em;
    }

    .contact-links a {
      color: #111;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .contact-links a:hover {
      text-decoration: underline;
    }

    section {
      padding: 60px 20px;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 40px;
    }

    /* Single column on tablet and below */
    @media (max-width: 1024px) {
      .shop-grid {
        grid-template-columns: 1fr;
      }
    }

    .shop-column {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-header img {
      height: 60px;
      margin-bottom: 20px;
    }

    .gallery-item {
      max-width: 480px;
      width: 100%;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      cursor: pointer;
    }

    #lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      text-align: center;
    }

    .lightbox-content img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
    }

    #lightbox-caption {
      color: white;
      margin-top: 15px;
    }

    #lightbox-close {
      position: absolute;
      top: -30px;
      right: 0;
      font-size: 2rem;
      color: white;
      cursor: pointer;
    }

    #about {
      position: relative;
      overflow: hidden;
    }

    #about::before {
      content: "";
      background-size: contain;
      background-repeat: no-repeat;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .about-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 60px;
      flex-wrap: wrap;
      padding: 80px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .about-image img {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      object-fit: cover;
    }

    .about-text {
      max-width: 500px;
      text-align: center;
    }

    .about-text img {
      width: 160px;
      margin-bottom: 20px;
    }

    .about-text p {
      font-size: 1.1em;
      color: #333;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 0.9em;
      color: #131313;
    }

    .matchbox-container {
      position: fixed;
      right: 0;
      top: 0;
      height: 100%;
      width: 60px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      z-index: 10;
      pointer-events: none;
    }

    .matchbox {
      position: relative;
      width: 30px;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      border: 2px dashed #333;
      border-radius: 4px 0 0 4px;
      box-shadow: inset 0 0 5px #aaa;
    }

    .match {
      position: absolute;
      right: 34px;
      width: 6px;
      height: 80px;
      background: #bbb;
      border-left: 1px solid #666;
      border-right: 1px solid #666;
      border-radius: 3px;
      box-shadow: 1px 1px 1px #999;
      transition: top 0.1s ease-out;
      transform: rotate(5deg);
      transform-origin: top center;
    }

    .head {
      width: 14px;
      height: 14px;
      background: #2e0505;
      border-radius: 50%;
      border: 1px solid #222;
      position: absolute;
      top: -8px;
      left: -5px;
    }

    .flame {
      position: absolute;
      top: -40px;
      left: -18px;
      width: 40px;
      height: 60px;
      background: radial-gradient(circle at center, rgb(255, 38, 0) 0%, rgba(255, 81, 0, 0.7) 40%, rgba(0, 150, 0, 0) 80%);
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.4) translateY(20px);
      pointer-events: none;
      filter: blur(1.5px) brightness(1.6);
      box-shadow:
        0 0 20px rgba(255, 88, 88, 0.8),
        0 0 60px rgba(252, 22, 22, 0.4),
        0 0 120px rgba(255, 0, 0, 0.356);
      mix-blend-mode: screen;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    .burning .flame {
      opacity: 1;
      animation: burn 1s infinite ease-in-out, flame-rise 1s forwards ease-in-out;
    }

    
    .video-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .video-wrapper video {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      
      min-height: 180px;
      background: #f0f0f0;
    }

    .play-pause-btn {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.25);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .video-wrapper:hover .play-pause-btn,
    .video-wrapper.paused .play-pause-btn {
      opacity: 0.45;
    }

    .play-pause-btn:hover {
      opacity: 0.75 !important;
    }

    .play-pause-btn svg {
      fill: #fff;
      width: 12px;
      height: 12px;
    }

    
    .video-wrapper.not-loaded video {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes burn {
      0% { transform: scale(0.7) translateY(10px) rotate(0deg); opacity: 0.95; }
      50% { transform: scale(1.1) translateY(-5px) rotate(5deg); opacity: 0.8; }
      100% { transform: scale(0.9) translateY(0px) rotate(-4deg); opacity: 1; }
    }

    @keyframes flame-rise {
      0% { transform: scale(0.4) translateY(20px); }
      100% { transform: scale(1) translateY(-40px); }
    }

    @media (max-width: 768px) {
      .about-content {
        flex-direction: column;
        padding: 40px 20px;
      }

      .about-image img {
        width: 200px;
        height: 200px;
      }

      .navbar {
        flex-direction: column;
        gap: 10px;
      }

      .navbar ul {
        justify-content: center;
      }

      .contact-overlay {
        padding: 20px 10px;
      }

      .contact-links {
        gap: 15px;
        font-size: 0.9em;
      }

      .section-header img {
        height: 40px;
      }

      .about-text img {
        width: 140px;
      }

      .shop-grid {
        gap: 30px;
      }

      .scroll-frames .bg-gif {
        width: 80%;
        max-height: 50vh;
      }

      
      .video-wrapper video {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>

  <div class="matchbox-container">
    <div class="matchbox" id="matchbox">
      <div id="match" class="match">
        <div class="head"></div>
        <div class="flame"></div>
      </div>
    </div>
  </div>

  <div class="scroll-frames" id="scrollFrames">
    <img src="img/ezgif.com-animated-gif-maker.gif" class="bg-gif" alt="background" loading="lazy" />
    <div class="contact-overlay">
      <img src="img/contact.png" alt="Contact Title" />
      <div class="contact-links">
        <a href="https://www.instagram.com/marypops32/" target="_blank">Instagram</a>
        <a href="mailto:marypops10032000@gmail.com">marypops10032000@gmail.com</a>
        <a href="https://mariiapopovych.github.io/contactme/" target="_blank">Multimedia</a>
      </div>
    </div>
  </div>

  <header class="navbar">
    <a href="#scrollFrames" style="font-size: 1.5em; text-decoration: none; color: #000;">POPOVYCH MARIIA</a>
    <nav>
      <ul>
        <li><a href="#shop"><img src="img/works.png" alt="Works" /></a></li>
        <li><a href="#about"><img src="img/artist.png" alt="About" /></a></li>
        <li><a href="#scrollFrames"><img src="img/contact.png" alt="Contact" /></a></li>
      </ul>
    </nav>
  </header>

  <section id="shop">
    <div class="shop-grid">

      <div class="shop-column">
        <div class="section-header"><img src="img/kinetic.png" alt="Drawing Icon" /></div>
        <div class="gallery-item">

          
          <div class="video-wrapper paused not-loaded">
            <video data-src="img/sponge.MP4" preload="none" playsinline></video>
            <button class="play-pause-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>

          <div class="video-wrapper paused not-loaded">
            <video data-src="img/cheerleader.MP4" preload="none" playsinline></video>
            <button class="play-pause-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>

          <div class="video-wrapper paused not-loaded">
            <video data-src="img/garbage.MP4" preload="none" playsinline></video>
            <button class="play-pause-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>

          <div class="video-wrapper paused not-loaded">
            <video data-src="img/objectterrible.MP4" preload="none" playsinline></video>
            <button class="play-pause-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>


          <div class="video-wrapper paused not-loaded">
            <video data-src="img/opener.MP4" preload="none" playsinline></video>
            <button class="play-pause-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>

          <div class="video-wrapper paused not-loaded">
            <video data-src="img/gaga.MP4" preload="none" playsinline></video>
            <button class="play-pause-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>

        </div>
      </div>

      <div class="shop-column">
        <div class="section-header"><img src="img/drawings.png" alt="drawings Icon" /></div>
        <div class="gallery-item"><img src="img/1.png" alt="superposition" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/2.png" alt="nonsence" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/3.png" alt="oompalumpa" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/4.png" alt="philosopher stone" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/5.png" alt="good person" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/6.png" alt="mom" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/7.png" alt="my cat" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/8.png" alt="bad thing" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/9.png" alt="found god" loading="lazy" /></div>
      </div>

      <div class="shop-column">
        <div class="section-header"><img src="img/objects.png" alt="objects Icon" /></div>
        <div class="gallery-item"><img src="img/tel.JPG" alt="noname" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/terrible.JPG" alt="noname" loading="lazy" /></div>
        <div class="gallery-item"><img src="img/dart.JPG" alt="noname" loading="lazy" /></div>
        <div class="gallery-item">
          <div class="video-wrapper paused not-loaded">
            <video data-src="img/chicken.MP4" preload="none" playsinline></video>
            <button class="play-pause-btn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </section>

  <section id="about">
    <div class="about-content">
      <div class="about-text">
        <p>
          Multidisciplinary artist with a BA in Cultural Studies from Ukraine, based in Bern.
          Projects span drawing, mechanical installations, and object-based works.
        </p>
      </div>
    </div>
  </section>

  <div id="lightbox">
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="Zoomed image" />
      <p id="lightbox-caption"></p>
      <span id="lightbox-close">&times;</span>
    </div>
  </div>

  <footer>
    All rights reserved © 2026
  </footer>

  <script>
    
    const galleryItems = document.querySelectorAll(".gallery-item img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxCaption = document.getElementById("lightbox-caption");
    const lightboxClose = document.getElementById("lightbox-close");

    galleryItems.forEach(img => {
      img.addEventListener("click", () => {
        lightboxImg.src = img.src;
        lightboxCaption.textContent = img.alt || "Artwork detail";
        lightbox.style.display = "flex";
      });
    });

    lightboxClose.addEventListener("click", () => { lightbox.style.display = "none"; });
    lightbox.addEventListener("click", (e) => { if (e.target === lightbox) lightbox.style.display = "none"; });

    
    const playIcon  = `<svg viewBox="0 0 24 24" fill="#fff" width="18" height="18"><polygon points="5,3 19,12 5,21"/></svg>`;
    const pauseIcon = `<svg viewBox="0 0 24 24" fill="#fff" width="18" height="18"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>`;

    function initVideoWrapper(wrapper) {
      const video = wrapper.querySelector("video");
      const btn   = wrapper.querySelector(".play-pause-btn");

      function togglePlay() {
        if (video.paused) {
          video.play();
          btn.innerHTML = pauseIcon;
          wrapper.classList.remove("paused");
        } else {
          video.pause();
          btn.innerHTML = playIcon;
          wrapper.classList.add("paused");
        }
      }

      btn.addEventListener("click", (e) => { e.stopPropagation(); togglePlay(); });
      video.addEventListener("click", togglePlay);
      video.addEventListener("ended", () => {
        btn.innerHTML = playIcon;
        wrapper.classList.add("paused");
      });
    }

    
    const videoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;

        const wrapper = entry.target;
        const video   = wrapper.querySelector("video");
        const dataSrc = video.getAttribute("data-src");

        if (dataSrc && !video.src) {
          video.src = dataSrc;          
          video.load();                 
          wrapper.classList.remove("not-loaded");
          initVideoWrapper(wrapper);    
        }

        videoObserver.unobserve(wrapper); 
      });
    }, { rootMargin: "300px 0px" });     

    document.querySelectorAll(".video-wrapper").forEach(w => videoObserver.observe(w));

    
    const match    = document.getElementById("match");
    const matchbox = document.getElementById("matchbox");
    const matchHeight = 80;

    window.addEventListener("scroll", () => {
      const boxHeight       = matchbox.offsetHeight;
      const maxTop          = boxHeight - matchHeight;
      const scrollableHeight = document.body.scrollHeight - window.innerHeight;
      const scrollRatio     = Math.min(1, window.scrollY / scrollableHeight);
      const matchTop        = scrollRatio * maxTop;

      match.style.top = matchTop + "px";

      if (scrollRatio >= 0.99) {
        match.classList.add("burning");
        document.body.classList.add("burning");
      } else {
        match.classList.remove("burning");
        document.body.classList.remove("burning");
      }
    });
  </script>
</body>
</html>
